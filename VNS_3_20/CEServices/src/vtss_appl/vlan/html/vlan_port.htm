<html>
<head>
 <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
 <title>VLAN Port Configuration</title>
 <link href="lib/normal.css" rel="stylesheet" type="text/css">
 <script type="text/javascript" src="lib/mootools-core.js"></script>
 <script type="text/javascript" src="lib/MasterControl.js"></script>
 <script type="text/javascript" src="lib/config.js"></script>
 <script type="text/javascript" src="lib/ajax.js"></script>
 <script type="text/javascript" src="lib/spom.js"></script>
 <script type="text/javascript" src="lib/dynforms.js"></script>
 <script type="text/javascript" src="lib/validate.js"></script>
 <script type="text/javascript">

// Help page magic
var help_page = "/help/help_vlan_port.htm";

var timerID;
var oTportframetype_v2 = Array("All", "Tagged", "Untagged");
var oTportframetype_v1 = Array("All", "Tagged");
var oTporttxtag = Array("Untag_pvid", "Tag_all", "Untag_all");
var oTporttype_v2 = Array("Unaware", "C-port", "S-port", "S-custom-port");
var oTporttype_v1 = Array("Unaware", "C-port");
var oVportframetype_v2 = Array(0, 1, 2);
var oVportframetype_v1 = Array(0, 1);
var oVporttxtag = Array(0, 2, 3);
var oVporttype_v2 = Array(0, 1, 2, 3);
var oVporttype_v1 = Array(0, 1);
var oTportvlan = Array("None", "Specific");
var oVportvlan = Array(1, 0);


var vlanportconfig = Array();

function addRow(index, frag, values) {
    var portno = values[0];
    var tr = CreateStyledElement("tr", index % 2 ? "config_odd" : "config_even");

    addTextCell(tr, configPortName(portno, 0), "cr");
    addSelectCell(tr, oTporttype_v2, oVporttype_v2, parseInt(values[1]), "c IsV2", "porttypev2_" + portno);
    addSelectCell(tr, oTporttype_v1, oVporttype_v1, parseInt(values[1]), "c IsV1", "porttypev1_" + portno);
    addCheckBoxCell(tr, parseInt(values[2]), "c haveIngressFiltering", "ingressflt_" + portno);
    addSelectCell(tr, oTportframetype_v2, oVportframetype_v2, parseInt(values[3]), "c IsV2", "frametypev2_" + portno);
    addSelectCell(tr, oTportframetype_v1, oVportframetype_v1, parseInt(values[3]), "c IsV1", "frametypev1_" + portno);

    //var noPVLAN = (values[4] == "0");
    var noPVLAN = ((values[4] == "1") && (values[6] == "0") && (values[5] == "0"));
    var sel = addSelectCell(tr, oTportvlan, oVportvlan, noPVLAN, "cr", "selpvlan_" + portno);
    var pvlan = addInputCell(tr, noPVLAN ? 1 : values[4] , "cr", "pvid_" + portno, 4);
    sel.onchange = function () { pvlan.disabled = (sel.selectedIndex == 0); };
    pvlan.disabled = noPVLAN; 
    pvlan.setAttribute("maxLength", 4); // 'camelCase' required for maxLength for this to work with IE.
    
    addSelectCell(tr, oTporttxtag, oVporttxtag, parseInt(values[5]), "c", "tx_tag_" + portno);
    frag.appendChild(tr);       // Add row to fragment
}

function processUpdate(req, ref)
{
    // Format: 
    // <port>/<aware>/<ingressflt>/<frametype>/<pvid>|....
    // 1/2/2/2/4095|....
    if(redirectOnError(req))
        return;
    if(req.responseText) {
        var vlandata = req.responseText.split("#");
        var vlan_tpid = vlandata[0];
        vlanportconfig = vlandata[1].split("|");
        var fld = document.getElementById("tpid");
        if (fld) {
            fld.value = fld.defaultValue = vlandata[0].toUpperCase();
        }
        // create holder for accumulated tbody elements and text nodes
        var frag = document.createDocumentFragment();
        for(var i = 0; i < vlanportconfig.length; i++) {
            if(vlanportconfig[i]) {
                var pval = vlanportconfig[i].split("/");
                addRow(i, frag, pval);
            }
        }
        var tbody = document.getElementById(ref);
        clearChildNodes(tbody);
        if (!tbody.appendChild(frag)) { // Add Frag to table body
            alert("This browser doesn't support dynamic tables.");
        }

        var cBar = new MasterControlBar([{text: "*", className: "cr"},
                                        {name: "porttypev2_"}, 
                                        {name: "porttypev1_"}, 
                                        {name: "ingressflt_"}, 
                                        {name: "frametypev2_"},
                                        {name: "frametypev1_"},
                                        {name: "selpvlan_"}, 
                                        {name: "pvid_"},
                                        {name: "tx_tag_"}]);
        cBar.construct('portCtrl', 'config_odd');

        var autorefresh = document.getElementById('autorefresh');
        if (autorefresh.checked) {
            if (timerID) {
                clearTimeout(timerID);
            }
            timerID = setTimeout('requestUpdate()', settingsRefreshInterval());
        }
        updateFuncBar(1);
    } else {
        SpomHandleError();
    }
}

function chkRefresh(fld) {
    if (!fld.checked) {
        if (timerID) {
            clearTimeout(timerID);
        }
        timerID = null;
    } else {
        requestUpdate(0);
    }
}

function requestUpdate() {
    if(SpomNavigationLoading())
        return;                 // Bail out, navigation will trigger update
    updateFuncBar(0);
    loadXMLDoc(SpomAddSidArg("/config/vlan_port"), processUpdate, 'vlanportData');
    SpomUpdateDisplaySid("display_sid");
    SpomUpdateFormSid("submit_sid");
}

function isEthType(str) {
    var myReg;
    if (!str) {
        return false;
    }
    myReg = /^[A-Fa-f0-9]{1,4}$/;

    var result = myReg.test(str);
    if (result) {
        var intFormat = parseInt("0x"+str); 
        if (intFormat<0x600) {
            return false;
        }
    }
    return result;
}

function checkForm(form)
{
    var i;
    fld = document.getElementById("tpid");
    if (fld) {
        if (!isEthType(fld.value)) {
            GiveAlert("The format of 'Ethernet Type' is restricted to 0x600-FFFF", fld);
            return false;
        }
    }
    for(var i = 0; i < vlanportconfig.length; i++) {
        if(vlanportconfig[i]) {
            var pval = vlanportconfig[i].split("/");
            var sel = document.getElementById("selpvlan_" + pval[0]);
            if(sel && sel.selectedIndex != 0) {
                if(!isWithinRange("pvid_" + pval[0], 1, 4095, "'Port VLAN ID'")) {
                    return false; // Disallow submit
                }
            }
        }
    }
    return true;                // Feed the chickens and go home
}

function SpomSidSelectorUpdate(sid)
{
    SpomSetCurrentSid(sid);     // Save current SID
    requestUpdate();            // Update page to reflect selector
}

function doReset(btn)
{
    var form = btn.form;
    form.reset();
    for(var i = 0; i < SpomCurrentPorts(); i++) {
        if (isStackPort(i + 1)) {
            continue;
        }
        var sel = document.getElementById("selpvlan_" + (i + 1));
        var pvid = document.getElementById("pvid_" + (i + 1));
        if(sel && pvid) {
            var disabled = (sel.selectedIndex == 0);
            pvid.disabled = disabled;
        }
    }
}

function updateFuncBar(enable)
{
    if (enable) {
        document.getElementById("refresh").style.visibility = "visible";
        document.getElementById("update").style.visibility = "hidden";
    } else {
        document.getElementById("refresh").style.visibility = "hidden";
        document.getElementById("update").style.visibility = "visible";
    }
}

 </script>
</head>

<body class="content" onload="requestUpdate();">
<div class="refreshbar">
 <form action="#">
  <label for="autorefresh">Auto-refresh</label>
  <input type="checkbox" name="autorefresh" id="autorefresh" onclick="chkRefresh(this);">
  <input type="button" id="refresh" value="Refresh" onClick="requestUpdate(); this.blur(); " style="visibility:hidden">
  <span id="update">&nbsp;Updating...</span>
 </form>
</div>

<form method="POST" action="/config/vlan_port" onsubmit="return checkForm(this);">

<h1><span class="hasTPID"> Ethertype for Custom S-ports    0x<INPUT id="tpid" name="tpid" maxlength="4" value="88A8" > </span></h1>
<h1>VLAN Port Configuration <span id="display_sid"></span></h1>

<table id="vlanportConfig" summary="Switch VLAN Port Configuration" cellspacing="0" class="config">
 <thead>
  <tr class="config_header">
   <th rowspan="2">Port</th>
   <th rowspan="2">Port Type</th>
   <th rowspan="2" class="haveIngressFiltering">Ingress Filtering</th>
   <th rowspan="2">Frame Type</th>
   <th colspan="2">Port VLAN</th>
   <th rowspan="2">Tx Tag</th>
  </tr>
  <tr class="config_header">
   <th>Mode</th>
   <th>ID</th>
  </tr>
 </thead>
 <tbody id="portCtrl">
 </tbody>
 <tbody id="vlanportData">
 </tbody>
</table>

<p>
<input type="hidden" id="submit_sid" name="sid">
<input type="submit" value="Save">
<input type="button" value="Reset" onclick="doReset(this);">
</p>

</form>

</body>
</html>
