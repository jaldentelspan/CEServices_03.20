<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=us-ascii">
  <title>VLAN port Statistics</title>
  <link href="lib/normal.css" rel="stylesheet" type="text/css">
  <script type="text/javascript" src="lib/config.js"></script>
  <script type="text/javascript" src="lib/ajax.js"></script>
  <script type="text/javascript" src="lib/spom.js"></script>
  <script type="text/javascript" src="lib/dynforms.js"></script>
<script type="text/javascript" language="JavaScript">  

// Help page magic
var help_page = "/help/help_vlan_port_stat.htm";
var timerID = null;
var vlanportstat = Array();
var Users = new Array();
var selectedtext="Static";  
var TX_Tag=Array("Untag_this","Tag_this", "Tag_All", "Untag_all" );
var PortType=Array("UnAware", "C-Port", "S-Port", "Custom-S-Port");
var FrameType=Array("All", "Tagged", "UnTagged");

 function SpomSidSelectorUpdate(sid)
 {
     SpomSetCurrentSid(sid);    
      requestUpdate();
 }

function addRow(index, frag, values) 
{
    var cnt;
    var tr = CreateStyledElement("tr", index % 2 ? "display_even" : "display_odd");
    for(cnt = 0;cnt < values.length; cnt++){
        if(cnt == 0){
            addTextCell(tr, configPortName(values[cnt], 0), "cr");
        }
        else if (cnt == 2) {
            var tmp = parseInt(values[cnt]);
            if (values[cnt] != 0x0f)
                addTextCell(tr, PortType[tmp], "cr");
            else
                addTextCell(tr, " ", "cr");
        }
        else if(cnt == 3){
            if (values[cnt] != 0x0f)
                addTextCell(tr, parseInt(values[cnt] )? "Enabled" :"Disabled", "cr");
            else
                addTextCell(tr, " ", "cr");
        }
        else if(cnt == 4){
            var tmp = parseInt(values[cnt]);
            if (values[cnt] != 0x0f)
                addTextCell(tr, FrameType[tmp], "cr");
            else
                addTextCell(tr, " ", "cr");
        }
        else if(cnt == 5){
            var tmp = parseInt(values[cnt] );
            if( tmp!= 0x0f)
                addTextCell(tr, TX_Tag[tmp], "cr") 
            else
                addTextCell(tr, " ", "cr") 
        }
		else if((cnt == 1) || (cnt == 6)){
        if(values[cnt] != 0xffff)
            addTextCell(tr, values[cnt], "cr");
        else
            addTextCell(tr, " ", "cr");
    	}         
        else{
            if(values[cnt] != 0x0f)
                addTextCell(tr, values[cnt], "cr");               
            else
                addTextCell(tr, " ", "cr");			
        }
    }  
    frag.appendChild(tr);       // Add row to fragment    
}

function createOptions(req, ref )
{
    var fval;
    if(req.responseText) {
        vlanportstat = req.responseText.split("#");
        for(var k = 1; k<vlanportstat.length;k++){
            fval = vlanportstat[k].split("|");
            Users[k-1]=fval[0];
        }
        var sel = document.getElementById(ref);        
        clearChildNodes(sel);
        var frag = document.createDocumentFragment();
        
        for (var i = 0; i < Users.length; i++) {
            var opt = document.createElement("option");
            opt.appendChild(document.createTextNode(Users[i]));
            
            opt.setAttribute("text", Users[i]);
            if(selectedtext == Users[i])
                opt.setAttribute("selected", true);
            frag.appendChild(opt);
        }
        sel.appendChild(frag);
        updateTable( );
    }
}

function updateTable( )
{
    var fval;    
    var frag = document.createDocumentFragment();
    for(var k = 1; k<vlanportstat.length;k++) {
        fval = vlanportstat[k].split("|");
        if (selectedtext == fval[0]) {
            if((fval[0] == vlanportstat[k])&&(fval[1]!=" ")) {             
                var tr = CreateStyledElement("tr", "notice");
                addTextCell(tr, "No data exists for the user", "cl", 8);
                frag.appendChild(tr);          
            }		            
            else {
                for(var i = 1; i < fval.length; i++) {
                    var pval = fval[i].split("/");		
                    addRow(i, frag, pval);
                }
            }
        }
    }
    var tbody = document.getElementById("vlanportData");
    
    clearChildNodes(tbody);
    if (!tbody.appendChild(frag)) { // Add Frag to table body
    alert("This browser doesn't support dynamic tables.");
    }    
    document.getElementById("update").style.visibility = "hidden";
}
function processUpdate(req)
{
	if(req.responseText) {
		vlanportstat = req.responseText.split("#");
       updateTable();	
		} 
    else {
	    SpomHandleError();
    }
   var autorefresh = document.getElementById('autorefresh');
   if(autorefresh.checked) {
     if(timerID)
       clearTimeout(timerID);
     timerID = setTimeout('requestUpdate()', settingsRefreshInterval());
   }
 }

function requestUpdate(type)
{ 
    if(SpomNavigationLoading())
        return;                 
	document.getElementById("update").style.visibility = "visible";
	if(type == "load"){
      loadXMLDoc(SpomAddSidArg("/stat/vlan_port_stat"), createOptions, 'VlanUser');
    }
    else{
      loadXMLDoc(SpomAddSidArg("/stat/vlan_port_stat"), processUpdate, null);	
	}    

    if (selectedtext != "Combined") {
	   document.getElementById("display_user").innerHTML=selectedtext + " user ";
    } else {
	   document.getElementById("display_user").innerHTML=selectedtext + " users ";
    }
    SpomUpdateDisplaySid("display_sid");
    SpomUpdateFormSid("submit_sid");
}

function chkRefresh(fld)
{
  if(!fld.checked) {
    if(timerID)
    clearTimeout(timerID);
    timerID = null;
    } 
  else {
    requestUpdate("refresh");
    }
  }

function VLANUserSelect(sel)
{
  selectedtext = sel.options[sel.selectedIndex].text;
   requestUpdate( );
  }

 </script>
</head>

<body class="content" onload="requestUpdate('load' );">

<h1>VLAN Port Status for <span id= "display_user"></span><span id= "display_sid"></span></h1>
<div class="refreshbar">
<form action="#">
  <select id="VlanUser" onchange= "VLANUserSelect(this);">
    <option value= "0" >Static </option>
    <option value= "6" >Combined </option>
  </select>
   <label for="autorefresh">Auto-refresh</label>
   <input type="checkbox" name="autorefresh" id="autorefresh" onclick="chkRefresh(this);">
   <input type="button" value="Refresh" onClick="requestUpdate('refresh'); this.blur();">
   <img id="update" alt="" src="images/updating.gif">
   </form>
   </div>
<table id="vlanportstat" summary="Current Switch VLAN Port Status" cellspacing="0" class="config">
 <thead>
  <tr class="port_stat">
   <th >Port</th>
   <th>PVID</th>
   <th>Port Type</th>
   <th>Ingress Filtering</th>
   <th>Frame Type</th>
   <th>Tx Tag</th>
   <th>UVID</th> 
   <th>Conflicts</th>
  </tr>
 </thead>
 <tbody id="vlanportData">
 </tbody>
 </table>
 <p>
<input type="hidden" id="submit_sid" name="sid">
</p>
</body>
</html>
