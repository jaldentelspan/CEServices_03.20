<html>
<head>
 <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
 <title>QCL Configuration Wizard - Policy</title>
 <link href="lib/normal.css" rel="stylesheet" type="text/css">

 <script type="text/javascript">
    
// Help page magic
var help_page = "/help/help_qcl_wizard_policy.htm";

function addRow(frag, values, idx) {
    var tr = CreateStyledElement("tr", idx % 2 ? "config_odd" : "config_even");
    var policyno = parseInt(values[0], 10);
    addTextCell(tr, policyno, "c");

    for (var portNum = 1; portNum <= configNormalPortMax; portNum++) {
        addRadioCell(tr, parseInt(values[portNum], 10), "c", "policy_port_" + portNum, "policy_" + policyno + "_port_" + portNum);
    }
    frag.appendChild(tr);       // Add row to fragment
}

function processUpdate(req, ref)
{
    if(redirectOnError(req)) {
        return;
    }
    if (req.responseText) {
        var policyConfig = req.responseText.split("|");
        //if (1) {
        //var policyConfig = req.split("|");

        // create holder for accumulated tbody elements and text nodes
        var frag = document.createDocumentFragment();
        for(var i = 0; i < policyConfig.length; i++) {
            if (policyConfig[i]) {
                var values = policyConfig[i].split("/");
                addRow(frag, values, i);
            }
        }
        
        var tbody = document.getElementById(ref);
        clearChildNodes(tbody);
        if (!tbody.appendChild(frag)) { // Add Frag to table body
            alert("This browser doesn't support dynamic tables.");
        }
    } else {
        SpomHandleError();   
    }
}

function checkForm()
{
    var fld;
    
    for(var i = 0; i <= 8; i++) {
        fld = document.getElementById("policy_name_"+ i);
        if (fld) {
            if (fld.value.length > 15) {
                GiveAlert("The maximum length of 'Policy Name " + (i+1) + "' is restricted to 15", fld);
                return false;
            }
        }
    }
    return true;
}

}

function GenerateHeader(id)
{
    var thead = document.getElementById(id);
    var frag = document.createDocumentFragment();
    var tr;

    tr = CreateStyledElement("tr", "config_header");
    addTextHeaderCell(tr, " ", "cl", "1");
    addTextHeaderCell(tr, "Port Members", "hdrc", configNormalPortMax);
    frag.appendChild(tr);       // Add row to fragment

    tr = CreateStyledElement("tr", "config_header");
    addTextHeaderCell(tr, "QCL ID", "cl");
    for (var i = configPortMin; i <= configNormalPortMax; i++) {
        addTextHeaderCell(tr, i, "portno");
    }
    frag.appendChild(tr);       // Add row to fragment

    thead.appendChild(frag);
}

function SpomSidSelectorUpdate(sid)
{
    SpomSetCurrentSid(sid);     // Save current SID
    requestUpdate();            // Update page to reflect selector
}

function goNextPage() {
    parent.saveEditData("qos_class");
}

 </script>
</head>

<body class="content" onload="GenerateHeader('header'); requestUpdate();">

<form name="policyForm" method="POST" action="/config/qcl_wizard_policy" onsubmit="return checkForm();">

<h1>Set up Policy Rules <span id="display_sid"></span></h1>
<h2>Group ports into several types according to different QCL policies.</h2>
<p>&nbsp;</p>

<table id="policyConfig" summary="QCL Policy Configuration" class="config">

</table>

</p>

</form>
