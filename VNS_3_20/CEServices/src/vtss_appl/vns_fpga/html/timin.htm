<html>
<head>
 <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
 <title>Port Configuration</title>
 <link href="lib/normal.css" rel="stylesheet" type="text/css">
 <link href="lib/alert_disable.css" rel="stylesheet" type="text/css">
 <script type="text/javascript" src="lib/config.js"></script>
 <script type="text/javascript" src="lib/ajax.js"></script>
 <script type="text/javascript" src="lib/spom.js"></script>
 <script type="text/javascript" src="lib/dynforms.js"></script>
 <script type="text/javascript" src="lib/mootools-core.js"></script>
 <script type="text/javascript" src="lib/MasterControl.js"></script>
 <script type="text/javascript" src="lib/validate.js"></script>
 <script type="text/javascript">

// Help page magic
var help_page =  "/help/help_dot_timin_config.htm";

var last_mirror_port = -1;
var modes = Array();
var TimeInList = Array(); // Array going to contain a list of ports for each switch in a stack
var CurrentTimeSource;         // Variable going to hold the current mirror port


function addRow(index, frag, values) {
    var portno          = values[0];
    var rx_mirror_ena  = values[1];
    var tx_mirror_ena  = values[2];
    
    var tr = CreateStyledElement("tr", index % 2 ? "config_odd" : "config_even");
    
    addTextCell(tr, configPortName(portno, 0), "cr");

    var oT = Array("Disabled","Rx only","Tx only", "Enabled"); // Text
    var oV = Array("0","1","2","3"); // Disabled, enabled,rx only,tx only

    // Determine the mode 
    val = 0;
    if (parseInt(rx_mirror_ena, 10)) {
	val = val + 1;
    }
    if (parseInt(tx_mirror_ena, 10)) {
	val = val + 2;
    }

    // Add the drop down list
    addSelectCell(tr, oT, oV, val, "cr", "mode_" + portno);
    modes[portno] = val; // Remember configuration. May be needed for updating the SelectCell
    frag.appendChild(tr);       // Add row to fragment

}


// Function that can update the mode slect boxes to support all modes or only "disable and "tx only"
function UpdateRow(id ,all,value)
{
    var oT;
    var oV;
    //if (all) { /* } comment for vim bug */
    if (true) { /* The port being mirrored is not displayed to user. Option 1 is actually port 13 or 14 depending.
                 * caused port 1 to only display "Disable" and "Rx Only"
                 */
        oT = Array("Disabled","Rx only","Tx only", "Enabled"); // Text
        oV = Array("0","1","2", "3"); // Disabled, enabled,rx only,tx only
    } else {
        oT = Array("Disabled","Rx only"); // Text
        oV = Array("0", "1"); // Disabled, enabled,rx only,tx only
        if (value === 0 || value === 2) {
            value = 0; // Convert "Disable" and "Tx only" to "Disable"
        } else {
            value = 1; // Convert "Enable" and "Rx only" to "Rx Only"
        }
    }
    UpdateIdSelect("mode_"+ id, oT, oV, value);
}

// When the mastercontrol is changed we need to limit the source to either disable or rx_only for the port corresponding to the mirror port.
function MasterControlChange(name) {
    var val = this.get('value'); // Get master control value

    // Loop through all elements and assign them to the master controls value (Done with Mootools).
    $$('select[id^="' + name + '"]:enabled').each(function(item) {
      item.selectedIndex = val;
    });

    // Filter out enable and tx_only for the mirror port.
    switch_id   = document.getElementById("switchselect").value;
    mirror_port = document.getElementById("timinselect").value;
    var isid    = document.getElementById("submit_sid").value;
    if (isid == -1 ||  isid == switch_id) {  
	UpdateRow(mirror_port, false, parseInt(val, 10)); // Update new mirror port to only support "disable" and "tx only"
    } 
}

// Function for updating the Port Drop down box.
function UpdatePortDropDown ()
{
    // Get the number of port for the destination switch currently selected.
     var TimInsList;
     var TimInElement;
     var TimeInEnum = Array(); // Array going to contain a list of ports for each switch in a stack
     var TimeInName = Array(); // Array going to contain a list of ports for each switch in a stack
     var opt;

    // TimInsList = SidPorts[0].split("#");
    TimInsList = TimeInList.split("#");
    // separting enum and name
    for(var i = 0; i < TimInsList.length; i++) {
        TimInElement= TimInsList[i].split('?');
        TimeInEnum.push(TimInElement[0]); 
        TimeInName.push(TimInElement[1]); 
    }

    // Get the drop down box and delete the current context.
    var port_sel = document.getElementById("timinselect");
    clearChildNodes(port_sel);


    // Add the ports options - Start from 1 (0 is disabled)
    for(var i = 0; i < TimInsList.length; i++) {
	// Build the Mirror port select list. Skipping the stacking ports
	opt = document.createElement("option");
	opt.appendChild(document.createTextNode(TimeInName[i]));
        var id_string=TimeInEnum[i].replace(/#/g,"");
        opt.setAttribute("id", id_string);
        opt.setAttribute("value", id_string);
	port_sel.appendChild(opt);
    }
    
  
    // Selelect the current destination port.
    port_sel = document.getElementById("timinselect");
    for(i = 0; i < TimInsList.length; i++) {
	opt = port_sel.options[i];
        if (opt.id === CurrentTimeSource) {
            port_sel.selectedIndex = i;
	}
    }
}

// Because we disables some of the element in "runtime", we need to
// do take special care of the reset.
function ResetUpdate() {
    document.MirrorForm.reset();
    UpdatePortDropDown(); // Reset the drop down box
}


function disablePage(msg)
{
    document.getElementById("firstNode").id = "dimScreen";
    document.getElementById("dimScreen").style.display = "block";

    var iDiv = document.createElement('div');
    iDiv.id = 'block';
    iDiv.className = 'alertDisable';
    document.getElementsByTagName('body')[0].appendChild(iDiv);
    iDiv.innerHTML = msg;
}

function processUpdate(req, ref)
{
    // Format: 
    //  <error_msg>,<current_time_source>|<time_source_enum_1>?<time_source_name_1>#<time_source_enum_2>?<time_source_name_2>#....
    if(redirectOnError(req)) {
        return;
    }
    if(req.responseText) {
        
        // Get portstart and port max
        var config       = req.responseText.split("|");
        var pval         = config[0].split(",");
        var ErrMsg       = pval[0];
        CurrentTimeSource       = pval[1];
        TimeInList         = config[1];

        document.getElementById('fpga_status').innerHTML = "";
	if (String(ErrMsg) !== "") {
            if(String(ErrMsg) === "disable"){  
                msg = "EPE configuration is currently being used for a network mirror. <br />Please disable the mirror configuration to enable EPE configuration.";
                disablePage(msg);
                return;
            }
            else if(String(ErrMsg) === "invalid"){  
                msg = "EPE configuration may not be available for your hardware configuration.<br />Please contact vendor.";
                disablePage(msg);
                return;
            }
            else if(String(ErrMsg) === "no_license"){  
                msg = "Ethernet PCM Encoder license is not valid.<br />Please contact vendor.";
                disablePage(msg);
                return;
            }
            else {
                alert(ErrMsg);
            }
	}
        // Create the "port to mirror to" drop down list
        UpdatePortDropDown();

    } else {
        SpomHandleError();
    }
}

function checkForm(form)
{

    return true;                // Feed the chickens and go home
}

function requestUpdate() {
    if(SpomNavigationLoading()) {
        return;                 // Bail out, navigation will trigger update
    }

    loadXMLDoc(SpomAddSidArg("/config/dot_timin_config"), processUpdate, 'TiminData');
    SpomUpdateDisplaySid("display_sid");
    SpomUpdateFormSid("submit_sid");
}

function SpomSidSelectorUpdate(sid)
{
    SpomSetCurrentSid(sid);     // Save current SID
    requestUpdate();            // Update page to reflect selector
}

function DocLoad()
{
    requestUpdate();
}

 </script>
</head>

<body class="content" onload="DocLoad();">
<div id="firstNode"></div>
<h1>.TIMIN Time Input Configuration</h1>

<form name="MirrorForm" method="POST" action="/config/dot_timin_config" onsubmit="return checkForm(this);">

<table id="qconfig" summary="Switch Default Class Configuration" class="config">
 <tbody>
  <tr class="config">
  </tr>
  <tr class="config">
   <td class="param_label"><label accesskey="P" for="timinselect">Time Input Source</label></td>
   <td>
    <select id="timinselect" name="timinselect" style="width: 7em;">
    </select>
   </td>
  </tr>
  <tr class="config SPOM_only">
   <td class="param_label"><label accesskey="S" for="switchselect">Switch to mirror to</label></td>
   <td>
    <select id="switchselect" name="switchselect" style="width: 7em;" onchange="UpdatePortDropDown();">
    </select>
   </td>
  </tr>
 </tbody>
</table>


<p>
<input type="hidden" id="submit_sid" name="sid">
<input type="submit" value="Save" name="save">
<input type="reset" value="Reset" onclick="ResetUpdate();">
</p>
</form>
<label id="fpga_status">Loading content. Please wait...</label>
</body>
</html>
