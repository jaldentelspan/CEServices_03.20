<html>

<head>
 <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
 <title>.1588 Configuration</title>
 <link href="lib/normal.css" rel="stylesheet" type="text/css">
 <script type="text/javascript" src="lib/ajax.js"></script>
 <script type="text/javascript" src="lib/config.js"></script>
 <script type="text/javascript" src="lib/dynforms.js"></script>
 <script type="text/javascript" src="lib/validate.js"></script>
 <script type="text/javascript">

// Help page magic
var help_page = "/help/help_dot_1588_config.htm";
var currentMode, currentModeNum;


function checkForm() {
 
    if(currentModeNum == document.getElementById("dot1588Mode").value)
    {
        alert("The unit is already in the selected mode");
        return false;
    }
    var r = confirm("Press \"OK\" to confirm to save changes");
    if (r == true) {
        return true; // User approved change
    }
    return false;
}

function processUpdate(req, ref) {
    currentMode = req.responseText;
    document.getElementById("status").innerHTML = currentMode;
    switch(currentMode){
        case "IEEE-1588 MASTER":            
            document.getElementById("dot1588Mode").value = "0"; 
            currentModeNum = "0";
            break;
        case "IEEE-1588 SLAVE":           
            document.getElementById("dot1588Mode").value = "1"; 
            currentModeNum = "1";
            break;
        case "DISABLED":            
            document.getElementById("dot1588Mode").value = "2"; 
            currentModeNum = "2";
            break;
        }
        
        
}

function requestUpdate() {

    if(loadXMLDoc("/config/dot_1588_config", processUpdate, null)== null)
    {
        alert("loadXMLDoc Failed");        
    }
}

 </script>
</head>

<body class="content" onload="requestUpdate()">

<h1>.1588 Configuration</h1>

<form method="POST" action="/config/dot_1588_config" onsubmit="return checkForm();">

    
    <table summary="1588 Mode Table" class="config">
        <tr class="config">
            <td class="param_label">Current Mode</td>
            <td class="cl" id="status"></td>
        </tr>
        
        
        <tr class="config">
            <td class="param_label">Mode</td>
            <td>
                <select id="dot1588Mode" name="dot1588Mode" >
                    <option value="0">master</option>
                    <option value="1">slave</option>
                    <option value="2" selected>disable</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>
                <input type="checkbox" id="override" name="override" >Modify PTP Clock</input>
            </td>
            <td>
            </td>
        </tr>
    </table>
      
<p>
<input type="submit" value="Save">
</p>

</form>
</body>
</html>
