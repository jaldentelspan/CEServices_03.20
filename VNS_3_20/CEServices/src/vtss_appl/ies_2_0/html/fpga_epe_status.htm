<html>

<head>
 <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
 <title>.FPGA_Status Configuration</title>
 <link href="lib/normal.css" rel="stylesheet" type="text/css">
 <script type="text/javascript" src="lib/ajax.js"></script>
 <script type="text/javascript" src="lib/config.js"></script>
 <script type="text/javascript" src="lib/dynforms.js"></script>
 <script type="text/javascript" src="lib/validate.js"></script>
 <script type="text/javascript">

// Help page magic
var help_page = "/help/help_epe_status.htm";
// Refresh timer
var timerID;

function chkRefresh(fld)
{
  if (!fld.checked) {
    if (timerID) {
      clearTimeout(timerID);
    }
    timerID = null;
  } else {
    requestUpdate();
  }
}
function clearPage()
{
    var divs = document.getElementsByTagName("div");
    for (var i=divs.length-1; i>=0;i-=1) {
        if (divs[i]){
            if(divs[i].id == "fpga_status") {
                divs[i].parentNode.removeChild(divs[i]);
            }
        } 
    }
    var tables = document.getElementsByTagName("TABLE");
    for (var i=tables.length-1; i>=0;i-=1)
        if (tables[i]) tables[i].parentNode.removeChild(tables[i]); 
    
    var breaks = document.getElementsByTagName("br");
    for (var i=breaks.length-1; i>=0;i-=1)
        if (breaks[i]) breaks[i].parentNode.removeChild(breaks[i]); 
    
    var header = document.getElementsByTagName("h1");
    for (var i=header.length-1; i>=0;i-=1)
        if (header[i]) header[i].parentNode.removeChild(header[i]); 
    
}
function processUpdate(req, ref) {
    
    clearPage();
    
var getText = req.responseText;
//    var getText = "FACTORY,.TIME,Time In:  001-00:18:48,Time Out: 001-00:00:00,.STATUS,S 01 0 4,.SYSTEM Error(s),.DISCRETE IN Error(s),.DISCRETE OUT Error(s),.GPS Error(s),00000008 Bad Signal,00000010 Time Sync Failure,.TIME IN Error(s),00000008 Bad Signal,00000010 Sync Failure,.TIME OUT Error(s),";
    // getText = getText.replace(/\s/g, '&nbsp;');
    var items = getText.split(",");     // slpit string from delimiter of ','
    var listLength = items.length -1; // last items is empty & do not want a additional cell created
//    document.writeln("<h1>.FPGA Status & Error Report</h1>")
    var body = document.getElementsByTagName("body")[0];
       
    var header = document.createElement("h1");
    body.appendChild(header);
    var headerText = document.createTextNode("FPGA EPE Status & Error Report");
    header.appendChild(headerText);
 //   body.append("<link href="lib/normal.css" rel="stylesheet" type="text/css">");
    for (var i = 0; i < listLength; i++) 
    {

        if(items[i].indexOf("*") == 0)
        {
            
         //    document.write("<br>");
              // get the reference for the body
            var lineBreak = document.createElement("br");
            body.appendChild(lineBreak);

            // creates a <table> element and a <tbody> element
            var tbl = document.createElement("table");
            tbl.setAttribute("class", "config");

            body.appendChild(tbl);
            var tblBody = document.createElement("tbody");
tblBody.classList.add("preserve-whitespace");
// document.getElementById("myDIV").style.whiteSpace = "nowrap";

            // creating all cells
              // creates a table row
            var row = document.createElement("tr");
            var cell = addLabelTextCell(row, items[i], "param_label", "cell"+ i);
            cell.style.width = "50em";
 
            tblBody.appendChild(row);
            
            while ((items[i + 1].indexOf("*") != 0)&&((i+1) < listLength)) // look at next item in array 
            {
                // Create a <td> element and a text node, make the text
                // node the contents of the <td>, and put the <td> at
                // the end of the table row
                i++;
                row = document.createElement("tr");
                var cell = document.createElement("td");
                cell.style.width = "20em";

                cellText = document.createTextNode( items[i]  );
                cell.setAttribute("class", "cl");
                cell.style.whiteSpace = "nowrap";
                cell.appendChild(cellText);
                row.appendChild(cell);
                // add the row to the end of the table body
                tblBody.appendChild(row);                    
            } 
             // put the <tbody> in the <table>
            tbl.appendChild(tblBody);
            // appends <table> into <body>
            body.appendChild(tbl);
            // sets the border attribute of tbl to 2;
            tbl.setAttribute("border", "1");
 
        }
 

    }


 // Update the timer
  var autorefresh = document.getElementById('autorefresh');
  if (autorefresh.checked) {
    if (timerID) {
      clearTimeout(timerID);
    }
    timerID = setTimeout('requestUpdate()', settingsRefreshInterval());
  }

}

function requestUpdate() {

    if(loadXMLDoc("/config/dot_fpga_epe_status", processUpdate, null)== null) {
        alert("loadXMLDoc Failed");        
    }
}

 </script>
</head>

<body class="content" onload="requestUpdate()">
      <div class="refreshbar">
    <form action="#">
      <label for="autorefresh">Auto-refresh</label>
      <input type="checkbox" name="autorefresh" id="autorefresh" onclick="chkRefresh(this);">
      <input type="button" value="Refresh"                       onclick="requestUpdate();this.blur();">
      <img id="update" alt="" src="images/updating.gif">
   </form>
  </div>
    
<form method="POST" action=#>


</form>
</body>
</html>
